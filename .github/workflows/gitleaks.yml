name: Secret scanning (gitleaks)

on:
  push:
    branches: ["main"]
  pull_request:
  # Also run on a schedule: secrets can be introduced in older commits and only
  # become problematic once the branch is public or shared.
  schedule:
    - cron: "0 6 * * *"

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch full history so gitleaks can scan all commits, not just HEAD.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE is required for organisation repos with the free
          # plan. Leave unset for personal/public repos; set in repo secrets
          # if you hit the license gate.
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
