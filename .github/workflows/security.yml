name: Security

on:
  push:
    branches: ["main"]
  pull_request:
  schedule:
    # Run weekly on Monday at 07:00 UTC to catch newly published CVEs
    - cron: "0 7 * * 1"

jobs:
  # ---------------------------------------------------------------------------
  # govulncheck — Go vulnerability database check
  # Flags known CVEs in direct and transitive dependencies as well as in
  # code paths actually reachable from this module.
  # Runs via `nix run .#govulncheck` so the environment is identical to local
  # development and to the rest of CI.
  # ---------------------------------------------------------------------------
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-

      - name: Run govulncheck
        run: nix run .#govulncheck

  # ---------------------------------------------------------------------------
  # gosec — static analysis for common Go security mistakes
  # Checks for hard-coded credentials, unsafe exec, weak crypto, path
  # traversal, and more — especially relevant for a codebase that handles
  # secrets and spawns privileged subprocesses.
  # Outputs SARIF so findings appear in the GitHub Security tab.
  # ---------------------------------------------------------------------------
  gosec:
    name: gosec
    runs-on: ubuntu-latest
    permissions:
      security-events: write  # needed to upload SARIF to GitHub Security tab
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-

      - name: Run gosec
        run: nix run .#gosec

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: gosec-results.sarif

  # ---------------------------------------------------------------------------
  # dependency-review — block PRs that introduce vulnerable dependencies
  # Uses the GitHub Advisory Database via the GitHub API — no local tooling
  # required, so no Nix setup needed here.
  # ---------------------------------------------------------------------------
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/dependency-review-action@v4
        with:
          # Fail on any severity; comment a summary on the PR
          fail-on-severity: moderate
          comment-summary-in-pr: always

