name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Go version is read from go.mod — no separate version pin needed.
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # Ensure the binary compiles. Catches build breaks that tests alone
      # won't surface (e.g. unreachable code, missing imports in main).
      - name: Build
        run: make build

      # go test -race ./... with CGO enabled (race detector requires CGO).
      - name: Test
        run: make test-race

      # go vet ./...
      - name: Lint
        run: make lint

      # gofmt -l — fails if any files are unformatted.
      - name: Format check
        run: make fmt-check

      # go test -tags=e2e ./cmd/envoke/... — builds the binary and runs smoke
      # tests against a mock bw/vault CLI, confirming end-to-end output format.
      - name: E2E tests
        run: make test-e2e
