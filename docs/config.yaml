# renv / kctx configuration file
#
# Default location: $XDG_CONFIG_HOME/renv/config.yaml
#                   (~/.config/renv/config.yaml if XDG_CONFIG_HOME is unset)
#
# Override path with: --config /path/to/config.yaml
#
# All settings can also be overridden by environment variables (see below).
# CLI flags take final precedence over both the file and env vars.
#
# Two-password model
# ------------------
# renv uses two separate passwords:
#
#   RENV_LOCAL_PASSWORD  — the local cache password.  Used to encrypt/decrypt
#                          the secret cache in /dev/shm.  Prompted once per
#                          invocation when not set.  Never sent to Bitwarden.
#
#   RENV_BW_PASSWORD     — the Bitwarden master password.  Used only to run
#                          `bw unlock --raw` on a cache miss or first access.
#                          Cleared from memory immediately after unlock.
#                          Never written to disk.
#
# Access flow:
#   1. Cache hit  (file exists, not expired): only RENV_LOCAL_PASSWORD needed.
#   2. Cache miss (first access, or TTL expired): both passwords needed.
#   3. --no-cache: only RENV_BW_PASSWORD needed (local password not prompted).

log:
  # Minimum log level written to stderr.
  # Values: debug | info | warn | error
  # Env: RENV_LOG_LEVEL
  # CLI: --log-level, --verbose (shorthand for debug)
  level: warn

  # Log output format.
  # Values: text | json
  # Env: RENV_LOG_FORMAT
  format: text

cache:
  # Maximum age of cached Bitwarden folder/collection items.
  # After this TTL expires the local encrypted cache is discarded and Bitwarden
  # is contacted again (requiring both the local cache password and the BW password).
  # Accepts Go duration strings: 1h30m, 4h, 24h, etc.
  # Env: RENV_CACHE_MAX_AGE
  max_age: 8h

timeouts:
  # Timeout for each Bitwarden CLI (bw) subprocess call.
  # Applies to: bw status, bw unlock, bw list folders/items/collections.
  # Env: RENV_TIMEOUT_BITWARDEN
  bitwarden: 30s

  # Timeout for each Vault CLI (vault) subprocess call.
  # Applies to: vault kv get.
  # Env: RENV_TIMEOUT_VAULT
  vault: 30s
