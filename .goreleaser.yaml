project_name: envoke
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: envoke
    main: ./cmd/envoke
    binary: envoke
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/opalbolt/envoke/internal/version.Version={{.Version}}
      - -X github.com/opalbolt/envoke/internal/version.Commit={{.ShortCommit}}
      - -X github.com/opalbolt/envoke/internal/version.BuildDate={{.Date}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

release:
  # release-please owns the GitHub release (creates it with the changelog).
  # goreleaser uploads binary artifacts to that existing release.
  # replace_existing_artifacts allows re-running goreleaser without failing.
  replace_existing_artifacts: true
